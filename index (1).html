  .match-title {text-align:center;font-size:22px;font-weight:700;margin-bottom:6px;}

  .prob-label {font-size:11px;color:var(--muted);margin-bottom:4px;}

function updateTeams() {

}

function poisson(k,l) {
  const fact=[1,1,2,6,24,120,720,5040,40320];
  return Math.exp(-l)*Math.pow(l,k)/fact[k];
}

function dcTau(h,a,l,m,r) {
  if(h==0&&a==0) return 1-l*m*r;
  if(h==0&&a==1) return 1+l*r;
  if(h==1&&a==0) return 1+m*r;
  if(h==1&&a==1) return 1-r;
  return 1;
}

function dcPredict(league,home,away) {
  const lg=MODEL.leagues[league];
  if(!lg) return null;
  const ht=lg.teams[home], at=lg.teams[away];
  if(!ht||!at) return null;
  let lam=Math.exp(ht.attack-at.defense+lg.h_adv)*0.7+ht.xg_pg*0.3;
  let mu =Math.exp(at.attack-ht.defense)*0.7+at.xg_pg*0.3;
  const ef=(ht.elo-at.elo)/400*0.08;
  lam=Math.max(0.3,lam+ef);
  mu =Math.max(0.3,mu-ef);
  const MAX=9;
  let pm=[],sum=0;
  for(let h=0;h<MAX;h++) { pm[h]=[];
    for(let a=0;a<MAX;a++) {
      const v=dcTau(h,a,lam,mu,lg.rho)*poisson(h,lam)*poisson(a,mu);
      pm[h][a]=v; sum+=v;
    }
  }
  let pH=0,pD=0,pA=0,scores=[];
  for(let h=0;h<MAX;h++) for(let a=0;a<MAX;a++) {
    pm[h][a]/=sum;
    if(h>a) pH+=pm[h][a]; else if(h===a) pD+=pm[h][a]; else pA+=pm[h][a];
    scores.push({h,a,p:pm[h][a]});
  }
  scores.sort((x,y)=>y.p-x.p);
  const conf=Math.max(pH,pD,pA);
  const pred=pH>pD&&pH>pA?'HOME WIN':pD>pA?'DRAW':'AWAY WIN';
  const clbl=conf>0.55?'Tinggi':conf>0.45?'Sedang':'Rendah';
  return {
    home,away,league,
    pH:(pH*100).toFixed(1),pD:(pD*100).toFixed(1),pA:(pA*100).toFixed(1),
    conf:(conf*100).toFixed(1),confLabel:clbl,pred,
    lam:lam.toFixed(3),mu:mu.toFixed(3),
    eloH:ht.elo,eloA:at.elo,eloGap:(ht.elo-at.elo).toFixed(0),
    xgH:ht.xg_pg,xgA:at.xg_pg,
    top:scores[0].h+'-'+scores[0].a,
    alt:scores[1].h+'-'+scores[1].a+', '+scores[2].h+'-'+scores[2].a,
  };
}
